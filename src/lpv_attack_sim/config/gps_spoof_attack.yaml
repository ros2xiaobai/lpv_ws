vehicle_ns: iris_0
rate_hz: 30.0
takeoff_height: 2.0
warmup_time: 4.0
pre_attack_time: 26.0  # 修改为26秒，使攻击在飞行半圆时开始（π/angular_rate ≈ 26.2s）
attack_duration: 35.0
post_attack_time: 12.0

# Fallback copy of the Gazebo GPS plugin spoofing parameters.
# The demo script loads the authoritative values from gps_spoof.sdf when available.
gps_spoof_offset:
  x: 2.0
  y: 1.5
  z: 0.0

# Slow drift added after attack starts, in m/s.
gps_spoof_drift_rate:
  x: 0.03
  y: 0.0
  z: 0.0

# Smooth transition duration for attack onset (seconds).
smooth_transition_duration: 3.0
# Longer exit duration reduces final recovery oscillation.
smooth_exit_duration: 8.0
# Keep the final spoofed GPS bias after the nominal attack window.
gps_spoof_hold_after_end: true
gps_spoof_takeoff_z: 1.5

trajectory:
  type: circle
  center_x: 15.0
  center_y: 12.0
  radius: 2.0
  angular_rate: 0.12
  yaw: 0.0

results_dir: /home/lxx/LPV_ws/src/lpv_attack_sim/results
